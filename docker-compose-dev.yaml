services:
  minio:
    image: minio/minio:latest
    container_name: tiles-processor-dev-minio
    command: server /data --console-address ":9001"
    ports:
      - "${S3_TILES_DATA_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    environment:
      MINIO_ROOT_USER: ${S3_TILES_DATA_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_TILES_DATA_SECRET_KEY}
    volumes:
      - minio_dev_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - tiles-dev-network

  minio-setup:
    image: minio/mc:latest
    container_name: tiles-processor-dev-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - tiles-dev-network
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 $} $${MINIO_ROOT_PASSWORD};
      mc mb myminio/${S3_TILES_DATA_BUCKET_NAME} --ignore-existing;
      mc anonymous set download myminio/${S3_TILES_DATA_BUCKET_NAME};
      echo 'Bucket created and configured';
      exit 0;
      "
    environment:
      MINIO_ROOT_USER: ${S3_TILES_DATA_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_TILES_DATA_SECRET_KEY}

  tiles-processor:
    container_name: tiles-processor-dev-container
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      minio-setup:
        condition: service_completed_successfully
    volumes:
      - ${DATA_DIR_HOST}:${DATA_DIR_CONTAINER}
      - ./settings.json:/app/settings.json:ro
    environment:
      - LOG_LEVEL=${LOG_LEVEL}
      - DATA_DIR_CONTAINER=${DATA_DIR_CONTAINER}
      - S3_TILES_DATA_ENDPOINT=minio:9000
      - S3_TILES_DATA_ACCESS_KEY=${S3_TILES_DATA_ACCESS_KEY}
      - S3_TILES_DATA_SECRET_KEY=${S3_TILES_DATA_SECRET_KEY}
      - S3_TILES_DATA_BUCKET_NAME=${S3_TILES_DATA_BUCKET_NAME}
      - S3_TILES_DATA_SECURE=false
    networks:
      - tiles-dev-network

volumes:
  minio_dev_data:

networks:
  tiles-dev-network:
    driver: bridge
