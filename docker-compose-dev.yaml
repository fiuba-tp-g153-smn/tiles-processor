services:
  tiles-processor:
    container_name: tiles-processor-dev-container
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ${TMP_DIR_HOST}:${TMP_DIR_CONTAINER}
    # Options: process_band_13 or process_band_9
    environment:
      - LOG_LEVEL=${LOG_LEVEL}
      - BAND_13_SCHEDULE_CRON=${BAND_13_SCHEDULE_CRON}
      - BAND_9_SCHEDULE_CRON=${BAND_9_SCHEDULE_CRON}
      - ENABLE_BAND_13=${ENABLE_BAND_13}
      - ENABLE_BAND_9=${ENABLE_BAND_9}
      - TZ=${TZ}
      - TMP_DIR_HOST=${TMP_DIR_HOST}
      - TMP_DIR_CONTAINER=${TMP_DIR_CONTAINER}
      - BOUNDS_MINX=${BOUNDS_MINX}
      - BOUNDS_MINY=${BOUNDS_MINY}
      - BOUNDS_MAXX=${BOUNDS_MAXX}
      - BOUNDS_MAXY=${BOUNDS_MAXY}
