# Auto-generated docker-compose file (dev)
# Generated by: scripts/generate-compose.sh
#
# To regenerate with different number of workers:
#   ./scripts/generate-compose.sh --dev 2 docker-compose-dev.yaml

services:
  # RabbitMQ message broker for the work queue
  rabbitmq:
    image: rabbitmq:4.2.4-management
    container_name: tiles-processor-rabbitmq
    ports:
      - "${RABBITMQ_PORT}:5672"      # AMQP protocol
      - "${RABBITMQ_MGMT_PORT}:15672"  # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}

      # Reduce CPU usage by disabling Erlang scheduler busy-wait tuning.
      # These settings are beneficial for low-throughput or idle-heavy workloads,
      # where minimizing background CPU wakeups is more important than latency.
      # +sbwt none       # Disable scheduler busy wait thresholds
      # +sbwtdcpu none   # Disable busy wait tuning for CPU-bound schedulers
      # +sbwtdio none    # Disable busy wait tuning for I/O-bound schedulers
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: >
        +sbwt none
        +sbwtdcpu none
        +sbwtdio none
    volumes:
      - rabbitmq_dev_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 15s
      start_interval: 1s

  # S3-compatible object storage
  seaweedfs:
    image: chrislusf/seaweedfs:4.17
    container_name: tiles-processor-dev-seaweedfs
    stop_grace_period: 30s
    entrypoint: /bin/sh
    command: -c "sh /start.sh"
    ports:
      - "${S3_TILES_DATA_PORT}:8333"      # S3 API
      - "8888:8888"      # Seaweedfs Filer
      - "9333:9333"      # Seaweedfs Master
      - "23646:23646"    # Seaweedfs Admin
      # - "9340:9340"      # Seaweedfs Volume server
    environment:
      - S3_ROOT_USER=${S3_ROOT_USER}
      - S3_ROOT_PASSWORD=${S3_ROOT_PASSWORD}
      - S3_TILES_DATA_BUCKET_NAME=${S3_TILES_DATA_BUCKET_NAME}
      - S3_TILES_DATA_TILES_PROCESSOR_USER=${S3_TILES_DATA_TILES_PROCESSOR_USER}
      - S3_TILES_DATA_TILES_PROCESSOR_PASSWORD=${S3_TILES_DATA_TILES_PROCESSOR_PASSWORD}
      - S3_TILES_DATA_DATA_SERVICE_USER=${S3_TILES_DATA_DATA_SERVICE_USER}
      - S3_TILES_DATA_DATA_SERVICE_PASSWORD=${S3_TILES_DATA_DATA_SERVICE_PASSWORD}
      - S3_INTERSECTION_DATA_BUCKET_NAME=${S3_INTERSECTION_DATA_BUCKET_NAME}
      - S3_INTERSECTION_DATA_ALERTS_SERVICE_USER=${S3_INTERSECTION_DATA_ALERTS_SERVICE_USER}
      - S3_INTERSECTION_DATA_ALERTS_SERVICE_PASSWORD=${S3_INTERSECTION_DATA_ALERTS_SERVICE_PASSWORD}
      - SEAWEEDFS_METRICS_ADDRESS=${SEAWEEDFS_METRICS_ADDRESS}
      - PROMETHEUS_PUSHGATEWAY_HTTP_PROTO=${PROMETHEUS_PUSHGATEWAY_HTTP_PROTO}
      - PROMETHEUS_PUSHGATEWAY_USER=${PROMETHEUS_PUSHGATEWAY_USER}
      - PROMETHEUS_PUSHGATEWAY_PASS=${PROMETHEUS_PUSHGATEWAY_PASS}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data_s3:/data
      - ./data_s3/data/filerldb2:/data/filerldb2
      - ./scripts/seaweedfs_start.sh:/start.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/seaweedfs_ready && wget -qO /dev/null http://seaweedfs:9333/cluster/status"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
      start_interval: 2s

  # Producer - discovers new images and publishes work units
  # Runs continuously with APScheduler (every 5 minutes)
  producer:
    image: tiles-processor
    container_name: tiles-processor-producer
    depends_on:
      rabbitmq:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy
    build:
      context: .
      dockerfile: Dockerfile
    command: python3 src/main.py producer
    volumes:
      - ./data:${DATA_DIR}
      - ./data/radar_h5:${DATA_DIR}/radar_h5
    environment:
      - LOG_LEVEL=${LOG_LEVEL}
      - DATA_DIR=${DATA_DIR}
      - S3_TILES_DATA_ENDPOINT=seaweedfs:8333
      - S3_TILES_DATA_BUCKET_NAME=${S3_TILES_DATA_BUCKET_NAME}
      - S3_TILES_DATA_SECURE=false
      - S3_TILES_DATA_TILES_PROCESSOR_USER=${S3_TILES_DATA_TILES_PROCESSOR_USER}
      - S3_TILES_DATA_TILES_PROCESSOR_PASSWORD=${S3_TILES_DATA_TILES_PROCESSOR_PASSWORD}
      - SEAWEEDFS_FILER_ENDPOINT=${SEAWEEDFS_FILER_ENDPOINT}
      - SEAWEEDFS_TILE_TTL=${SEAWEEDFS_TILE_TTL}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=${RABBITMQ_PORT}
      - RABBITMQ_USER=${RABBITMQ_USER}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
      - RABBITMQ_QUEUE=${RABBITMQ_QUEUE}
      - RABBITMQ_DLQ=${RABBITMQ_DLQ}
      - RABBITMQ_DLX=${RABBITMQ_DLX}
      - JOB_TTL_MINUTES=${JOB_TTL_MINUTES}
      - GDAL_CACHEMAX=${GDAL_CACHEMAX}
      - CPL_VSIL_CURL_CACHE_SIZE=${CPL_VSIL_CURL_CACHE_SIZE}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 15s
      start_interval: 1s

  # Worker 1 - processes work units from the queue
  worker1:
    image: tiles-processor
    container_name: tiles-processor-worker1
    stop_grace_period: 30s
    depends_on:
      rabbitmq:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy
    build:
      context: .
      dockerfile: Dockerfile
    command: python3 src/main.py worker
    volumes:
      - ./data:${DATA_DIR}
      - ./data/radar_h5:${DATA_DIR}/radar_h5
    environment:
      - LOG_LEVEL=${LOG_LEVEL}
      - DATA_DIR=${DATA_DIR}
      - S3_TILES_DATA_ENDPOINT=seaweedfs:8333
      - S3_TILES_DATA_BUCKET_NAME=${S3_TILES_DATA_BUCKET_NAME}
      - S3_TILES_DATA_SECURE=false
      - S3_TILES_DATA_TILES_PROCESSOR_USER=${S3_TILES_DATA_TILES_PROCESSOR_USER}
      - S3_TILES_DATA_TILES_PROCESSOR_PASSWORD=${S3_TILES_DATA_TILES_PROCESSOR_PASSWORD}
      - SEAWEEDFS_FILER_ENDPOINT=${SEAWEEDFS_FILER_ENDPOINT}
      - SEAWEEDFS_TILE_TTL=${SEAWEEDFS_TILE_TTL}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=${RABBITMQ_PORT}
      - RABBITMQ_USER=${RABBITMQ_USER}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
      - RABBITMQ_QUEUE=${RABBITMQ_QUEUE}
      - RABBITMQ_DLQ=${RABBITMQ_DLQ}
      - RABBITMQ_DLX=${RABBITMQ_DLX}
      - JOB_TTL_MINUTES=${JOB_TTL_MINUTES}
      - GDAL_CACHEMAX=${GDAL_CACHEMAX}
      - CPL_VSIL_CURL_CACHE_SIZE=${CPL_VSIL_CURL_CACHE_SIZE}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 15s
      start_interval: 1s

  # Worker 2 - processes work units from the queue
  worker2:
    image: tiles-processor
    container_name: tiles-processor-worker2
    stop_grace_period: 30s
    depends_on:
      rabbitmq:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy
    build:
      context: .
      dockerfile: Dockerfile
    command: python3 src/main.py worker
    volumes:
      - ./data:${DATA_DIR}
