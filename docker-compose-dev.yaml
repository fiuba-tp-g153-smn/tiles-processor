services:
  minio:
    image: minio/minio:latest
    container_name: tiles-processor-dev-minio
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_PORT:-9000}:9000"      # S3 API - accessible externally
      - "${MINIO_CONSOLE_PORT:-9001}:9001"  # Web Console - accessible externally
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_dev_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - tiles-dev-network

  minio-setup:
    image: minio/mc:latest
    container_name: tiles-processor-dev-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - tiles-dev-network
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb myminio/${MINIO_BUCKET:-tiles-data} --ignore-existing;
      mc anonymous set download myminio/${MINIO_BUCKET:-tiles-data};
      echo 'Bucket created and configured';
      exit 0;
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}

  tiles-processor:
    container_name: tiles-processor-dev-container
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      minio-setup:
        condition: service_completed_successfully
    volumes:
      - ${DATA_DIR_HOST}:${DATA_DIR_CONTAINER}
      - ./settings.json:/app/settings.json:ro
    environment:
      - LOG_LEVEL=${LOG_LEVEL}
      - DATA_DIR_CONTAINER=${DATA_DIR_CONTAINER}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_BUCKET=${MINIO_BUCKET:-tiles-data}
      - MINIO_SECURE=false
    networks:
      - tiles-dev-network

volumes:
  minio_dev_data:

networks:
  tiles-dev-network:
    driver: bridge
