# Alembic configuration for the two tiles-processor SQLite stores.
#
# Each database is an INDEPENDENT named section with its own history, env and
# alembic_version table (they evolve separately). The sqlalchemy.url is left
# blank here and injected at runtime by src/db/migrate.py, because the database
# paths are dynamic (config.METRICS_DB_PATH, ${TMP_DIR}/progress_tracker.db).
#
# Invoked programmatically (command.upgrade with config_ini_section set), or via
# the CLI to author revisions: `alembic -c alembic.ini -n metrics revision -m "..."`.

[metrics]
script_location = %(here)s/migrations/metrics
sqlalchemy.url =

[progress]
script_location = %(here)s/migrations/progress
sqlalchemy.url =
