    container_name: tiles-processor-producer
    depends_on:
      rabbitmq:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy
    build:
      context: .
      dockerfile: Dockerfile
    command: python3 src/main.py producer
    volumes:
