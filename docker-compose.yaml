services:
  tiles-processor:
    image: tiles-processor
    container_name: tiles-processor-container
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - LOG_LEVEL=${LOG_LEVEL}
        - DATA_DIR_CONTAINER=${DATA_DIR_CONTAINER}
    volumes:
      - tiles_data:${DATA_DIR_CONTAINER}
      - ./settings.json:/app/settings.json:ro
    environment:
      - LOG_LEVEL=${LOG_LEVEL}
      - DATA_DIR_CONTAINER=${DATA_DIR_CONTAINER}

volumes:
  tiles_data:
    external: true
